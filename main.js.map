

<clr-main-container>
    <clr-header class="header-5">
        <div class="branding">
            <a href="" class="nav-link">
                <clr-icon shape="cloud"></clr-icon>
                <span class="title">TCS ECP</span>
            </a>
        </div>
        
    </clr-header>
    <div class="content-container">
        <main class="content-area">
          <div class="clr-row">
              <div class="clr-col-lg-6 clr-col-12">
                  <div class="card">
                      <div class="card-header">
                          TCS Entprise Cloud Platform Portal
                      </div>
                      <div class="card-block">
                          <div class="card-media-block">
                              <img src="/assets/TCS-logo.png" style="width:100px;height:50px;" class="">
                              <div class="card-media-description">
                                 
                                  
                              </div>
                          </div>
                          <div class="card-text">
                              <p class="card-text">
                                  Welcome to TCS Enterprise Cloud Platform
                                  </p>
                          </div>
                      </div>
                      <div class="card-footer">
                          version: 0.1
                      </div>
                  </div>
              </div>
          
          </div>
        </main>
        <!---<nav class="sidenav" [clr-nav-level]="2">-->
            <clr-vertical-nav [clrVerticalNavCollapsible]="true" class="nav-trigger--bottom" class="sidenav" [clr-nav-level]="2">
                <a clrVerticalNavLink routerLink="/dashboard">
                    <clr-icon clrVerticalNavIcon shape="home"></clr-icon>
                    Dashboard
                </a>
                <a clrVerticalNavLink routerLink="/about">
                    <clr-icon clrVerticalNavIcon shape="info-standard"></clr-icon>
                    About
                </a>
                <a clrVerticalNavLink routerLink="/chargeback">
                  <clr-icon clrVerticalNavIcon shape="pound"></clr-icon>
                  Chargeback
              </a>
            </clr-vertical-nav>
        <!---</nav>-->
    </div>
  </clr-main-container>
